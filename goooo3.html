    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #050505;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
        }

               /* --- BLUR LAYERING LOGIC --- */
        #main-app-content, .hub-btn { 
            transition: filter 0.4s ease, transform 0.4s ease, opacity 0.4s ease, width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), height 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        /* Level 1: Hub Active (Blur background app) */
        body.hub-active #main-app-content { 
            filter: blur(15px); 
            pointer-events: none; 
            transform: scale(0.97); 
        }

        /* Level 2: Panel Active (Blur EVERYTHING behind panel) */
        body.panel-active #main-app-content { 
            filter: blur(25px); 
            pointer-events: none; 
        }

        /* Apply smooth blur and fade to the HUB STACK when any panel is open */
        body.panel-active #hub-stack { 
            filter: blur(10px); 
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: all 0.4s ease;
        }

        
        
     
        /* --- CONTENT PANEL --- */
        .content-panel {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 420px;
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 45px 45px 30px 30px;
            padding: 30px;
            z-index: 2000;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            max-height: 85vh;
            overflow-y: auto;
        }
        .content-panel.active { bottom: 30px; }

        .panel-close-btn { position: absolute; top: 20px; right: 20px; width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .swipe-handle { width: 50px; height: 6px; background: rgba(255,255,255,0.15); border-radius: 10px; margin: -15px auto 20px; cursor: grab; }

        /* --- APP LAYOUT --- */
        .app-shell { display: flex; height: 100dvh; }
        .sidebar { width: 380px; border-right: 1px solid rgba(255,255,255,0.05); background: #050505; }
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; z-index: 100; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .chat-view { position: fixed; inset: 0; transform: translateX(100%); transition: 0.3s; }
            .chat-view.active { transform: translateX(0); }
        }

        .msg-bubble { max-width: 80%; padding: 12px 18px; font-size: 14px; position: relative; }
        .msg-me { background: var(--gold); color: black; border-radius: 20px 20px 4px 20px; align-self: flex-end; }
        .msg-them { background: #1a1a1a; color: white; border-radius: 20px 20px 20px 4px; align-self: flex-start; }

        .unread-badge {
            background: var(--gold); color: black; font-size: 10px; font-weight: 800; min-width: 18px; height: 18px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center; padding: 0 5px;
        }

        .icon-btn { color: #666; transition: 0.2s; cursor: pointer; }
        .icon-btn:hover { color: var(--gold); }

        .attachment-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px 0;
        }

        .scroll-hide::-webkit-scrollbar { width: 0; }
        
        .info-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .stat-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .stat-fill { height: 100%; background: var(--gold); }
        
        
        
        
       /* --- HUB BUTTONS (Bottom Right Stack) --- */
      .hub-stack {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 50;
            align-items: flex-end;
        }

        .hub-btn {
            width: 60px;
            height: 60px;
            background: var(--gold);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hub-btn.expanded {
            width: 320px;
            height: 360px;
            border-radius: 35px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: block;
            padding: 24px;
            z-index: 1001; 
        }



        .hub-grid { 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            width: 100%;
            height: 100%;
        }
        .hub-btn.expanded .hub-grid { display: grid; }
        .hub-btn.expanded .hub-icon { display: none; }

        .grid-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #888; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        .grid-item:hover { color: var(--gold); transform: translateY(-2px); }
        .grid-item span { font-size: 9px; margin-top: 8px; font-weight: 700; text-transform: uppercase; text-align: center; }

    </style>
</head>

        function toggleHub(type, e) {
            if(e) e.stopPropagation();
            const hubs = { main: 'main-hub', explore: 'explore-hub' };
            const target = hubs[type];
            
            if (currentOpenHub === type) {
                document.getElementById(target).classList.remove('expanded');
                pushAppState({ hub: type });
                currentOpenHub = null;
                hubOpen = false;
                document.body.classList.remove('hub-active');
            } else {
                Object.values(hubs).forEach(h => document.getElementById(h).classList.remove('expanded'));

                hubOpen = true;
                document.body.classList.add('hub-active');
            }

        /* ===== ATTACHMENT SYSTEM ===== */

let selectedFile = null;


/* Open file picker */
function openFilePicker(type) {

    const picker = document.getElementById("file-picker");

    if (type === "image") {
        picker.accept = "image/*";
    }
    else if (type === "video") {
        picker.accept = "video/*";
    }
    else if (type === "audio") {
        picker.accept = "audio/*";
    }
    else {
        picker.accept = "*/*";
    }

    picker.click();
}


/* Handle file select */
function handleFileSelect(e) {

    const file = e.target.files[0];

    if (!file) return;

    selectedFile = file;

    showPreview(file);
}


/* Show preview modal */
function showPreview(file) {

    const body = document.getElementById("panel-body");

    const url = URL.createObjectURL(file);

    let previewHTML = "";


    /* Image */
    if (file.type.startsWith("image")) {

        previewHTML = `
            <img src="${url}"
                 class="rounded-xl max-w-full max-h-72 mx-auto shadow-xl">
        `;
    }


    /* Video */
    else if (file.type.startsWith("video")) {

        previewHTML = `
            <video src="${url}" controls
                   class="rounded-xl max-w-full max-h-72 mx-auto"></video>
        `;
    }


    /* Audio */
    else if (file.type.startsWith("audio")) {

        previewHTML = `
            <audio src="${url}" controls class="w-full"></audio>
        `;
    }


    /* File */
    else {

        previewHTML = `
            <div class="p-6 bg-white/5 rounded-xl text-center">
                <p class="font-bold">${file.name}</p>
                <p class="text-xs text-gray-500">
                    ${(file.size/1024).toFixed(1)} KB
                </p>
            </div>
        `;
    }


    /* Inject into main panel */
    body.innerHTML = `

        <h3 class="text-[#D4AF37] text-2xl font-bold mb-4">
            Attachment Preview
        </h3>

        <div class="mb-4">
            ${previewHTML}
        </div>

        <textarea
            id="attach-note"
            class="w-full p-3 rounded-xl bg-white/5 border border-white/10
                   text-sm mb-4 resize-none"
            placeholder="Add a note..."
            rows="2"></textarea>

        <button
            onclick="sendAttachment()"
            class="w-full py-4 bg-[#D4AF37] text-black
                   font-bold rounded-2xl">

            Send Attachment

        </button>
    `;


    panelOpen = true;
    document.getElementById("content-panel").classList.add("active");

    pushAppState({ attach: true });
}


/* Send attachment */
function sendAttachment() {

    if (!selectedFile) return;

    const note = document.getElementById("attach-note").value;

    const contact = CONTACTS.find(c => c.id === activeId);

    const url = URL.createObjectURL(selectedFile);

    let bubble = "";


    /* Image */
    if (selectedFile.type.startsWith("image")) {

        bubble = `
            <div class="msg-bubble msg-me space-y-1">
                <img src="${url}" class="rounded-xl max-w-[220px]">
                ${note ? `<p class="text-xs opacity-80">${note}</p>` : ""}
            </div>
        `;
    }

    /* Video */
    else if (selectedFile.type.startsWith("video")) {

        bubble = `
            <div class="msg-bubble msg-me space-y-1">
                <video src="${url}" controls class="rounded-xl max-w-[220px]"></video>
                ${note ? `<p class="text-xs opacity-80">${note}</p>` : ""}
            </div>
        `;
    }

    /* Audio */
    else if (selectedFile.type.startsWith("audio")) {

        bubble = `
            <div class="msg-bubble msg-me space-y-1">
                <audio src="${url}" controls></audio>
                ${note ? `<p class="text-xs opacity-80">${note}</p>` : ""}
            </div>
        `;
    }

    /* File */
    else {

        bubble = `
            <div class="msg-bubble msg-me space-y-1 p-3">
                <div class="flex items-center gap-2">
                    📄 <span class="text-xs">${selectedFile.name}</span>
                </div>
                ${note ? `<p class="text-xs opacity-80">${note}</p>` : ""}
            </div>
        `;
    }


    document.getElementById("msg-list")
        .insertAdjacentHTML("beforeend", bubble);


    contact.chat.push({
    from: "me",
    type: selectedFile.type.startsWith("image") ? "image" :
          selectedFile.type.startsWith("video") ? "video" :
          selectedFile.type.startsWith("audio") ? "audio" : "file",

    file: url,
    name: selectedFile.name,
    note: note
});

    closeAttachment();

    renderContacts();

    scrollToBottom();
}


/* Close preview */
function closeAttachment() {

    closePanel();   // Close main panel

    selectedFile = null;

    document.getElementById("file-picker").value = "";
}


/* Auto scroll */
function scrollToBottom() {

    const list = document.getElementById("msg-list");

    list.scrollTop = list.scrollHeight;
}

        /* ===== DEVICE BACK BUTTON HANDLER ===== */

function pushAppState(state) {
    history.pushState(state, "", "");
}

function handleBackNavigation() {

    // If panel is open → close it
    if (panelOpen) {
        closePanel();
        return;
    }

    // If hub is open → close it
    if (currentOpenHub) {
        const hubId = currentOpenHub === 'main' ? 'main-hub' : 'explore-hub';

        document.getElementById(hubId).classList.remove('expanded');

        currentOpenHub = null;
        hubOpen = false;
        document.body.classList.remove('hub-active');
        return;
    }

    // If chat is open on mobile → go back to contact list
    if (
        window.innerWidth < 768 &&
        document.getElementById('chat-window').classList.contains('active')
    ) {
        toggleChat(false);
        return;
    }

    // Otherwise → allow normal browser back
    history.back();
}


// Listen for back button
window.addEventListener("popstate", handleBackNavigation);
